# Spec for `ncli apply -f examples/apply/sync.yaml`.
# Reconciles events (negentropy-style two-way diff/sync) between exactly
# ONE local event store and exactly ONE remote relay: `from` and `to` are
# each a single flow, one local and one remote (either way round) —
# `direction` controls which way data actually moves.
#
# NIP-13 proof-of-work is accepted regardless of nonce validity by default
# (a `nonce` tag is optional per-event, so a bad one isn't treated as fatal);
# set `strictPow: true` below, or pass --strict-pow to `ncli apply` (which
# overrides this field when given explicitly), to drop pulled events whose
# nonce doesn't meet its declared difficulty. Doesn't apply to `trusted:
# true`.

kind: sync
spec:

  from:
    relay: wss://relay.ohstr.com
    # trusted (optional, default false): skip re-verifying this source's
    # event signatures before use -- only safe for a relay/store you
    # already trust to hand you validly-signed events.
    trusted: true

  to:
    type: local
    path: ./build/.dev/db/notes-sync-2.db
    ensure: create # create the local store if it doesn't exist yet

  

  # direction (optional, default "both"):
  #   both - reconcile in both directions
  #   up   - only push local events missing on the remote
  #   down - only pull remote events missing locally
  direction: down

  # Filters scope which events participate in the sync (optional, defaults
  # to an empty filter matching everything).
  filters:
    - kinds: [0]
      # `since` already looks backward by default — "40d" means "in the
      # last 40 days". Don't prefix it with "-", that flips it to the future.
      since: "40d"

  # maxReconcileRounds (optional, default 20): cap on negentropy round trips.
  maxReconcileRounds: 20

  # pullBatchSize (optional, default 100): events requested per pull batch.
  pullBatchSize: 100

  # Custom connection timeouts (optional). Values are Go duration strings.
  timeouts:
    handshake: "5s"
    ping: "30s"
    pong: "60s"
    write: "60s"

  # strictPow (optional, default false): drop pulled events whose `nonce`
  # tag fails NIP-13 validation, instead of inserting them regardless. See
  # the note at the top of this file.
  strictPow: false
